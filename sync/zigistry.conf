# zigistry.conf
# Configuration for the zub sync pipeline.

# ── Topics to ignore as keywords ──────────────────────────────────────────────
# These topics are stripped from keywords before writing the package frontmatter.
# Add one topic per line. Values are ignored (use = yes or leave blank).
[ignore_topics]
zig-package = yes
zig         = yes
ziglang     = yes
zig-lang    = yes
zig-library = yes
zig-lib     = yes
library     = yes
lib         = yes

# ── Topic-to-category mapping ─────────────────────────────────────────────────
# Each line maps a GitHub topic (left) to one of the 6 zub categories (right).
# Topics not listed here produce no category (package will be uncategorized).

[topics]

